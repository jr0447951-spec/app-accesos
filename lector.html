<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini-Link Auto-Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --ericsson-blue: #002561; }
        body { background-color: #f4f7f9; }
        .sidebar { height: 100vh; background: white; border-right: 1px solid #dee2e6; overflow-y: auto; }
        .nav-link { cursor: pointer; color: #333; border-bottom: 1px solid #eee; }
        .nav-link:hover { background: #eef2f7; }
        .header { background: var(--ericsson-blue); color: white; padding: 15px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar p-0">
            <div class="p-3 bg-light border-bottom">
                <h6>Reportes en Drive</h6>
                <button onclick="handleAuthClick()" class="btn btn-sm btn-primary w-100">Cargar Carpeta</button>
            </div>
            <div id="fileList" class="nav flex-column">
                <p class="p-3 text-muted small">Haz clic en "Cargar" para ver los archivos...</p>
            </div>
        </div>

        <div class="col-md-9 p-0">
            <div class="header">
                <h5 class="mb-0">Detalle del Nodo: <span id="nodeTitle">Ninguno seleccionado</span></h5>
            </div>
            <div id="viewerContent" class="p-4" style="display:none;">
                <div class="card p-3 mb-3" id="infoGeneral"></div>
                <div class="card p-3">
                    <h6>Inventario de Hardware</h6>
                    <table class="table table-sm mt-2">
                        <thead><tr><th>MOC</th><th>Serial Number</th><th>Revision</th></tr></thead>
                        <tbody id="invBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const CLIENT_ID = 'TU_CLIENT_ID.apps.googleusercontent.com';
    const API_KEY = 'TU_API_KEY';
    const FOLDER_ID = 'ID_DE_TU_CARPETA_DRIVE'; // Cambia esto por el ID de tu carpeta
    const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';

    let accessToken = null;

    function handleAuthClick() {
        const client = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (resp) => {
                accessToken = resp.access_token;
                listXmlFiles();
            }
        });
        client.requestAccessToken();
    }

    async function listXmlFiles() {
        const response = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+name+contains+'.xml'&fields=files(id,name)&key=${API_KEY}`, {
            headers: { Authorization: `Bearer ${accessToken}` }
        });
        const data = await response.json();
        const listDiv = document.getElementById('fileList');
        listDiv.innerHTML = data.files.map(f => `
            <a class="nav-link p-3" onclick="loadXml('${f.id}', '${f.name}')">
                📄 ${f.name}
            </a>
        `).join('');
    }

    async function loadXml(fileId, fileName) {
        const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
            headers: { Authorization: `Bearer ${accessToken}` }
        });
        const xmlText = await resp.text();
        const xml = new DOMParser().parseFromString(xmlText, "text/xml");
        
        // Renderizado automático
        document.getElementById('viewerContent').style.display = 'block';
        document.getElementById('nodeTitle').innerText = xml.querySelector('Label')?.textContent || fileName;
        
        // Info General
        document.getElementById('infoGeneral').innerHTML = `
            <p><strong>IP:</strong> ${xml.querySelector('Ip')?.textContent}</p>
            <p><strong>Fecha Reporte:</strong> ${xml.querySelector('Generated')?.textContent}</p>
        `;

        // Inventario
        const modules = xml.querySelectorAll('HardwareInventory Module');
        document.getElementById('invBody').innerHTML = Array.from(modules).map(m => `
            <tr>
                <td>${m.querySelector('Moc')?.textContent}</td>
                <td><span class="badge bg-light text-dark border">${m.querySelector('SerialNumber')?.textContent}</span></td>
                <td>${m.querySelector('HardwareRevision')?.textContent}</td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
