<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Link XML Modern Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 30px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 20px; }
        .header-ericsson { background: #002561; color: white; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .table-custom thead { background: #005a8d; color: white; }
        .badge-info { background-color: #17a2b8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-ericsson d-flex justify-content-between align-items-center">
        <div>
            <h1 class="h3 mb-0">Visualizador de Reportes Mini-Link</h1>
            <small id="reportDate">Seleccione un archivo .xml</small>
        </div>
        <input type="file" id="fileInput" class="form-control w-25" accept=".xml">
    </div>

    <div id="content" style="display: none;">
        <div class="card p-3">
            <h5 class="text-primary border-bottom pb-2">Información del Nodo (NE)</h5>
            <div class="row" id="neInfo">
                </div>
        </div>

        <div class="card p-3">
            <h5 class="text-primary border-bottom pb-2">Inventario de Hardware</h5>
            <div class="table-responsive">
                <table class="table table-hover table-custom">
                    <thead>
                        <tr>
                            <th>MOC</th>
                            <th>Product Number</th>
                            <th>Revision</th>
                            <th>Serial Number</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            processMiniLink(xmlDoc);
        };
        reader.readAsText(file);
    });

    function processMiniLink(xml) {
        document.getElementById('content').style.display = 'block';
        
        // 1. Fecha y Título
        const fecha = xml.querySelector('Generated')?.textContent || 'N/A';
        const label = xml.querySelector('Label')?.textContent || 'Sin Nombre';
        const ip = xml.querySelector('Ip')?.textContent || 'S/N';
        document.getElementById('reportDate').innerText = `Reporte generado el: ${fecha}`;

        // 2. Info de NE
        document.getElementById('neInfo').innerHTML = `
            <div class="col-md-4"><strong>Nombre:</strong> ${label}</div>
            <div class="col-md-4"><strong>IP Address:</strong> ${ip}</div>
            <div class="col-md-4"><strong>Status:</strong> <span class="badge bg-success">Online</span></div>
        `;

        // 3. Inventario de Hardware
        const modules = xml.querySelectorAll('HardwareInventory Module');
        let invHtml = '';
        modules.forEach(mod => {
            invHtml += `
                <tr>
                    <td><strong>${mod.querySelector('Moc')?.textContent || '-'}</strong></td>
                    <td>${mod.querySelector('HardwareProductNumber')?.textContent || '-'}</td>
                    <td>${mod.querySelector('HardwareRevision')?.textContent || '-'}</td>
                    <td><code>${mod.querySelector('SerialNumber')?.textContent || '-'}</code></td>
                </tr>
            `;
        });
        document.getElementById('inventoryTable').innerHTML = invHtml;
    }
</script>

</body>
</html>
