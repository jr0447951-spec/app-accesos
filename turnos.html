<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Turnos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título Dinámico del Mes */
        .month-title {
            text-align: center;
            padding: 40px 0 30px 0;
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 6px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* Contenedor del Calendario */
        .calendar-wrapper {
            width: 100%;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--glass-border);
        }

        /* Celdas de días */
        .day-cell {
            background: rgba(15, 23, 42, 0.4);
            min-height: 110px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .day-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .day-name {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
        }

        .day-number {
            font-size: 1rem;
            font-weight: 800;
            color: #94a3b8;
        }

        /* Etiquetas de los Técnicos */
        .staff-tag {
            font-size: 0.7rem;
            padding: 5px 8px;
            border-radius: 6px;
            margin-bottom: 4px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #e0e7ff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .staff-tag i {
            font-size: 0.6rem;
            color: var(--primary);
        }

        /* Indicador de carga */
        #loader {
            margin-top: 100px;
            text-align: center;
            color: var(--primary);
        }

        /* Estilo para fin de semana */
        .weekend {
            background: rgba(30, 41, 59, 0.6);
        }

        @media (max-width: 700px) {
            .month-title { font-size: 1.8rem; letter-spacing: 3px; }
            .day-cell { min-height: 90px; padding: 6px; }
            .staff-tag { font-size: 0.6rem; padding: 3px 5px; }
        }
    </style>
</head>
<body>

    <h1 id="mesActual" class="month-title">CARGANDO...</h1>

    <div id="loader">
        <i class="fas fa-spinner fa-spin fa-3x"></i>
        <p>Sincronizando turnos...</p>
    </div>

    <div class="calendar-wrapper" id="calendarBody" style="display:none;">
        <div class="grid" id="mainGrid"></div>
    </div>

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbz4sh_vXh482aDDmeYAhHDnhx-YYbStTyDEXYZrXre0YPkx-a0iK9HKkRzoJfg74-h_/exec";
    const daysNames = ["DOMINGO", "LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO"];
    let apiData = [];

    async function init() {
        try {
            const response = await fetch(SHEETS_URL);
            apiData = await response.json();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('calendarBody').style.display = 'block';
            renderCalendar();
        } catch (e) {
            document.getElementById('loader').innerHTML = "<p>⚠️ No se pudo cargar el calendario.</p>";
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        
        const now = new Date(); 
        const year = now.getFullYear();
        const month = now.getMonth();
        
        // Título del Mes
        document.getElementById('mesActual').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long' }).format(now);

        const firstDay = new Date(year, month, 1).getDay();
        const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
        const totalDays = new Date(year, month + 1, 0).getDate();

        // Celdas vacías
        for(let i=0; i<startOffset; i++) {
            grid.innerHTML += `<div class="day-cell" style="opacity:0.1"></div>`;
        }

        // Generar días
        for(let d=1; d<=totalDays; d++) {
            const currentObjDate = new Date(year, month, d);
            const dayIdx = currentObjDate.getDay();
            const dayName = daysNames[dayIdx];
            const isWeekend = (dayIdx === 0 || dayIdx === 6);

            const cell = document.createElement('div');
            cell.className = `day-cell ${isWeekend ? 'weekend' : ''}`;
            
            cell.innerHTML = `
                <div class="day-info">
                    <span class="day-name">${dayName.substring(0, 3)}</span>
                    <span class="day-number">${d}</span>
                </div>
                <div id="staff-cont-${d}"></div>
            `;
            grid.appendChild(cell);

            // Filtrar técnicos de la base de datos
            const matchTurnos = apiData.filter(t => {
                const parts = t.Fecha.split('/');
                return parseInt(parts[0]) === d && parseInt(parts[1]) === (month + 1);
            });

            const staffCont = document.getElementById(`staff-cont-${d}`);
            matchTurnos.forEach(t => {
                const names = [t.Tecnico_1, t.Tecnico_2].filter(n => n && n.trim() !== "");
                names.forEach(name => {
                    staffCont.innerHTML += `
                        <div class="staff-tag">
                            <i class="fas fa-user-check"></i> ${name}
                        </div>
                    `;
                });
            });
        }
    }

    init();
</script>
</body>
</html>
