<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Turnos Personal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #facc15;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }

        /* Título del Mes */
        .month-title {
            text-align: center;
            padding: 25px 0;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .search-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        /* Cuadrícula del Calendario */
        .calendar-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--glass-border);
        }

        .day-cell {
            background: rgba(15, 23, 42, 0.4);
            min-height: 100px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        /* Día y Número */
        .day-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .day-name {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
        }
        .day-number {
            font-size: 0.9rem;
            font-weight: 800;
            color: #94a3b8;
        }

        /* Estilo de los nombres de técnicos */
        .staff-tag {
            font-size: 0.65rem;
            padding: 4px 6px;
            border-radius: 8px;
            margin-bottom: 3px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .staff-tag i { font-size: 0.6rem; opacity: 0.7; }

        /* Resaltado cuando el técnico busca su nombre */
        .highlight-turn {
            background: var(--accent) !important;
            color: #422006 !important;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
            border: none;
            transform: scale(1.03);
        }

        #loader {
            text-align: center;
            padding: 40px;
            color: #6366f1;
            font-weight: bold;
        }

        /* Adaptación para móviles */
        @media (max-width: 600px) {
            .month-title { font-size: 1.5rem; letter-spacing: 2px; }
            .day-cell { min-height: 80px; padding: 4px; }
            .day-name { font-size: 0.5rem; }
            .staff-tag { font-size: 0.55rem; }
        }
    </style>
</head>
<body>

    <h1 id="mesActual" class="month-title">CARGANDO...</h1>

    <div class="search-container">
        <input type="text" id="userInput" class="search-box" placeholder="🔍 Escribe tu nombre para buscarte..." oninput="updateCalendar()">
    </div>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>

    <div class="calendar-wrapper" id="calendarBody" style="display:none;">
        <div class="grid" id="mainGrid"></div>
    </div>

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycby2z6FHW7GIj5WCEIltflNUvYWfPKJlrsPxeIT5RbVTS5plaYfffIyc0hiPC_vp9tyH/exec";
    let apiData = [];
    const daysNames = ["DOMINGO", "LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO"];

    async function init() {
        try {
            const response = await fetch(SHEETS_URL);
            apiData = await response.json();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('calendarBody').style.display = 'block';
            updateCalendar();
        } catch (e) {
            document.getElementById('loader').innerHTML = "⚠️ Error al cargar los datos.";
        }
    }

    function updateCalendar() {
        const grid = document.getElementById('mainGrid');
        const query = document.getElementById('userInput').value.toUpperCase();
        grid.innerHTML = "";
        
        const now = new Date(); // Puedes cambiar esto a la fecha de la data si prefieres
        const year = now.getFullYear();
        const month = now.getMonth();
        
        document.getElementById('mesActual').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long' }).format(now);

        const firstDay = new Date(year, month, 1).getDay();
        const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
        const totalDays = new Date(year, month + 1, 0).getDate();

        // Espacios vacíos mes anterior
        for(let i=0; i<startOffset; i++) {
            grid.innerHTML += `<div class="day-cell" style="opacity:0.2"></div>`;
        }

        // Días del mes
        for(let d=1; d<=totalDays; d++) {
            const currentObjDate = new Date(year, month, d);
            const dayName = daysNames[currentObjDate.getDay()];
            const dateStr = `${d}/${month+1}/${year}`;

            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            cell.innerHTML = `
                <div class="day-info">
                    <span class="day-name">${dayName.substring(0, 3)}</span>
                    <span class="day-number">${d}</span>
                </div>
                <div id="staff-cont-${d}"></div>
            `;

            grid.appendChild(cell);
            const staffCont = document.getElementById(`staff-cont-${d}`);

            // Buscar turnos en la data de Sheets
            const matchTurnos = apiData.filter(t => {
                const parts = t.Fecha.split('/');
                return parseInt(parts[0]) === d && parseInt(parts[1]) === (month + 1);
            });

            matchTurnos.forEach(t => {
                const isMatch = query !== "" && (t.Tecnico_1.toUpperCase().includes(query) || (t.Tecnico_2 && t.Tecnico_2.toUpperCase().includes(query)));
                
                const names = [t.Tecnico_1, t.Tecnico_2].filter(n => n && n.trim() !== "");
                names.forEach(name => {
                    staffCont.innerHTML += `
                        <div class="staff-tag ${isMatch ? 'highlight-turn' : ''}">
                            <i class="fas fa-user-check"></i> ${name}
                        </div>
                    `;
                });
            });
        }
    }

    init();
</script>
</body>
</html>
