<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor de Sitio - Network Ops</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/7532/7532164.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary: #00a1ff; 
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --success: #22c55e;
            --warning: #fbbf24;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding-bottom: 100px; 
            background: radial-gradient(circle at top right, #1e293b, var(--dark-bg));
            color: white; min-height: 100vh;
        }

        header { 
            width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
            padding: 15px 0; position: sticky; top: 0; z-index: 2000;
            border-bottom: 1px solid var(--border); text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0; font-size: 1.2rem; letter-spacing: 2px;
            background: linear-gradient(to bottom, #ffffff, #00a1ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 8px rgba(0, 161, 255, 0.5));
        }

        #status-indicator {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            margin-top: 5px; opacity: 0.8; font-family: 'Orbitron', sans-serif;
        }

        .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .dot-sync { background: var(--warning); animation: pulse 1s infinite; }
        .dot-ready { background: var(--success); }
        .dot-error { background: var(--danger); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .search-area { width: 92%; max-width: 500px; margin: 20px auto; position: relative; }
        #siteSearch { 
            width: 100%; padding: 16px 45px 16px 18px; font-size: 1rem; border-radius: 14px; 
            border: 1px solid var(--border); background: rgba(255,255,255,0.05);
            color: white; outline: none; box-sizing: border-box;
        }
        #clearBtn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.15); border: none; color: white;
            width: 28px; height: 28px; border-radius: 50%; display: none; cursor: pointer;
            align-items: center; justify-content: center;
        }

        .suggestions { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: #1e293b; border-radius: 12px; max-height: 250px; 
            overflow-y: auto; z-index: 3000; display: none; margin-top: 5px; border: 1px solid var(--primary);
        }
        .suggestion-item { padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .suggestion-item:hover { background: rgba(0, 161, 255, 0.1); }

        #result { width: 92%; max-width: 500px; margin: 0 auto; scroll-margin-top: 100px; }

        .card { 
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 24px; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: fadeIn 0.3s ease-out;
        }

        .header-title { 
            background: rgba(0, 161, 255, 0.15); padding: 18px; border-radius: 16px; 
            text-align: center; margin-bottom: 15px; border: 1px dashed var(--primary); cursor: pointer;
        }
        .header-title h2 { margin: 0; font-size: 1rem; text-transform: uppercase; font-family: 'Orbitron', sans-serif; line-height: 1.4; }
        .copy-tag { font-size: 0.6rem; color: var(--primary); font-weight: bold; margin-top: 6px; display: block; }

        .map-box { 
            width: 100%; height: 200px; border-radius: 16px; overflow: hidden; 
            margin-bottom: 15px; border: 1px solid var(--border); background: #000;
        }

        /* FILA DE INSIGNIAS OPERATIVAS - DISEÑO COMPACTO ORIGINAL */
        .ops-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .ops-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 10px 4px;
            border-radius: 12px;
            text-align: center;
        }
        .ops-badge-label {
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 800;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .ops-badge-val {
            font-size: 1.15rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            display: block;
        }

        .info-list { display: flex; flex-direction: column; gap: 10px; }
        .info-item { background: rgba(255,255,255,0.03); padding: 10px 14px; border-radius: 12px; border-left: 4px solid var(--primary); }
        .info-label { font-size: 0.6rem; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; display: block; }
        .info-val { font-size: 1rem; color: #fff; font-weight: 500; }

        .maintenance-container { margin-top: 5px; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: rgba(255, 255, 255, 0.02); margin-bottom: 5px; }
        .maintenance-trigger {
            width: 100%; padding: 15px; background: rgba(0, 161, 255, 0.1); border: none;
            color: var(--primary); font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .maintenance-content { display: none; padding: 10px; flex-direction: column; gap: 8px; animation: fadeIn 0.3s ease; }

        .key-alert { 
            background: #be123c; border-left: 4px solid #ff4d4d; color: white; 
            padding: 12px; border-radius: 12px; font-weight: bold; display: flex; 
            flex-direction: column; align-items: flex-start; gap: 4px; margin-bottom: 10px; font-size: 0.85rem;
        }

        .btn-gps, .btn-wa { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 18px; border-radius: 16px; text-decoration: none; font-weight: 800; margin-top: 12px;
            font-family: 'Orbitron', sans-serif; font-size: 0.9rem; border: none; width: 100%; cursor: pointer;
            box-sizing: border-box;
        }
        .btn-gps { background: linear-gradient(135deg, var(--primary), #0072ff); color: white; margin-top: 25px; }
        .btn-wa { background: linear-gradient(135deg, #25d366, #128c7e); color: white; }

        .btn-home {
            position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; border-radius: 50%;
            background: rgba(0, 161, 255, 0.1); backdrop-filter: blur(10px); border: 2px solid var(--primary);
            box-shadow: 0 0 15px rgba(0, 161, 255, 0.4); color: white; cursor: pointer; z-index: 5000;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-copy-small { background: none; border: none; cursor: pointer; padding: 0; font-size: 1.1rem; opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>CONSULTOR DE SITIO</h1>
    <div id="status-indicator">
        <span id="status-dot" class="dot dot-sync"></span>
        <span id="status-text">Sincronizando...</span>
    </div>
</header>

<div class="search-area">
    <input type="text" id="siteSearch" placeholder="🔍 ID o Nombre del sitio..." autocomplete="off">
    <button id="clearBtn" onclick="limpiar()">✕</button>
    <div id="suggestions" class="suggestions"></div>
</div>

<div id="result"></div>

<button class="btn-home" onclick="goHome()">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
</button>

<script>
let sites = [];
const input = document.getElementById('siteSearch');
const clearBtn = document.getElementById('clearBtn');
const sugDiv = document.getElementById('suggestions');
const resultDiv = document.getElementById('result');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE_5CZtD7qHGW5cWHGAjn7ALTphVm5h88lco9cySYoAe2VBW4fq8DQ7-SZY6cd_FHtNQJS3MpE88hs/pub?gid=1955381502&single=true&output=csv';

function procesarCSV(data) {
    const rows = data.split(/\r?\n/).filter(row => row.trim().length > 0);
    const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
    return rows.slice(1).map(row => {
        const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        let obj = {};
        headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim().replace(/"/g, '') : '');
        return obj;
    });
}

fetch(SHEETS_URL)
    .then(r => r.text())
    .then(data => {
        sites = procesarCSV(data);
        localStorage.setItem('sites_cache', JSON.stringify(sites));
        statusDot.className = "dot dot-ready";
        statusText.innerText = `Red Lista: ${sites.length} Sitios`;
    })
    .catch(() => {
        const cached = localStorage.getItem('sites_cache');
        if (cached) {
            sites = JSON.parse(cached);
            statusDot.className = "dot dot-ready";
            statusText.innerText = `Modo Offline: ${sites.length} Sitios`;
        }
    });

input.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    clearBtn.style.display = val.length > 0 ? 'flex' : 'none';
    if (val.length < 2) { sugDiv.style.display = 'none'; return; }
    const matches = sites.filter(s => (s.SITEID && s.SITEID.toLowerCase().includes(val)) || (s['NOMBRE DE SITIO'] && s['NOMBRE DE SITIO'].toLowerCase().includes(val))).slice(0, 8);
    
    sugDiv.innerHTML = matches.map(s => {
        const idSeguro = s.SITEID ? s.SITEID.trim() : '';
        const nombreSeguro = s['NOMBRE DE SITIO'] ? s['NOMBRE DE SITIO'].trim() : 'SITIO SIN NOMBRE';
        return `<div class="suggestion-item" onclick="seleccionar('${idSeguro}', '${nombreSeguro.replace(/'/g, "\\'")}')">
            <strong>${idSeguro || '⚠️ SIN ID'}</strong><br>
            <small>${nombreSeguro}</small>
        </div>`;
    }).join('');
    sugDiv.style.display = matches.length ? 'block' : 'none';
});

// Función para traducir decimales (ej. 3.25 o 4.75) a horas y minutos legibles (ej: 3h 15m)
function formatearAutonomia(valRaw) {
    if (!valRaw) return 'N/A';
    
    // Quitar espacios y limpiar texto adicional (si ya dice "H" o "horas")
    let valorLimpio = valRaw.replace(/[^\d.]/g, '').trim();
    let num = parseFloat(valorLimpio);
    
    if (isNaN(num)) return valRaw; // Si no es un número limpio, devolvemos el texto original de Excel

    let horas = Math.floor(num);
    let decimal = num - horas;
    let minutos = Math.round(decimal * 60);

    // Si los minutos redondeados dan 60, sumamos una hora extra y ponemos 0 minutos
    if (minutos === 60) {
        horas += 1;
        minutos = 0;
    }

    if (horas === 0) {
        return `${minutos}m`;
    } else if (minutos === 0) {
        return `${horas}h`;
    } else {
        return `${horas}h ${minutos}m`;
    }
}

function seleccionar(id, nombreRespaldo) {
    const s = sites.find(x => id ? x.SITEID === id : x['NOMBRE DE SITIO'] === nombreRespaldo);
    if (!s) return;
    
    sugDiv.style.display = 'none';
    input.value = s['NOMBRE DE SITIO'] || '';

    const idMostrar = (s.SITEID || "S/N").trim();
    const nombreMostrar = (s['NOMBRE DE SITIO'] || "SITIO SIN NOMBRE").trim();

    const accesoNocturno = (s['ACCESO NOCTURNO'] || s['Acceso Nocturno'] || 'NO').trim();
    const comentarioAcceso = (s['COMENTARIO DE ACCESO'] || s['Comentario de Acceso'] || '').trim();
    const conectarMg = (s['POSIBLIDAD DE CONECTAR MG'] || s['POSIBILIDAD DE CONECTAR MG'] || 'NO').trim();
    const autonomiaRaw = (s['autonomia estimada'] || s['Autonomia Estimada'] || '').trim();
    
    // Convertimos la autonomía decimal a formato legible en tiempo real
    const autonomiaFormateada = formatearAutonomia(autonomiaRaw);

    const colorAcceso = accesoNocturno.toUpperCase().startsWith('SI') ? 'var(--success)' : 'var(--danger)';
    const colorConectar = conectarMg.toUpperCase().startsWith('SI') ? 'var(--success)' : 'var(--danger)';

    const rawLlave = (s['Llave requerida'] || s['LLAVE REQUERIDA'] || "").trim();
    const infoLlave = (s['Información de llave'] || s['INFORMACION DE LLAVE'] || "").trim();
    let llaveHTML = '';
    if (rawLlave.toUpperCase().startsWith("SI")) {
        llaveHTML = `
            <div class="key-alert">
                <span>🔑 LLAVE NECESARIA</span>
                <span style="font-size:0.75rem; font-weight:normal;">${rawLlave}</span>
                ${infoLlave ? `<span style="font-size:0.72rem; font-weight:800; margin-top:5px; border-top:1px solid rgba(255,255,255,0.2); width:100%; padding-top:5px;">ℹ️ INFO: ${infoLlave}</span>` : ''}
            </div>`;
    }

    const lat = s.LATITUDE || s.Latitude || s.Latitud;
    const lon = s.LONGITUDE || s.Longitude || s.Longitud;
    const propNombre = s['Nombre para Propietario'] || 'N/A';
    const nicNis = s['NIC/NIS'] || 'N/A';

    const textoWA = encodeURIComponent(`🛰️ *CONSULTA DE SITIO*\n🆔 *ID:* ${idMostrar}\n🏢 *NOMBRE:* ${nombreMostrar}\n👤 *PROP:* ${propNombre}\n📍 *MAPA:* https://www.google.com/maps?q=${lat},${lon}`);
    const waUrl = `https://wa.me/?text=${textoWA}`;

    let maintenanceHTML = '';
    const tieneMtto = s['Canidad de aceite'] || s['Cantidad de refrigerante'] || s['filtro aceite'] || s['Filtro de aire'] || s['Filtro de combustible'];
    
    if (tieneMtto) {
        maintenanceHTML = `
            <div class="maintenance-container">
                <button class="maintenance-trigger" onclick="toggleMaint()">
                    <span>🛠️ FICHA TÉCNICA / MTTO MG</span>
                    <span id="maint-arrow">▼</span>
                </button>
                <div id="maint-content" class="maintenance-content">
                    <div class="info-item"><span class="info-label">Cant. Aceite</span><span class="info-val">${s['Canidad de aceite'] || '0'} Galones</span></div>
                    <div class="info-item"><span class="info-label">Cant. Refrigerante</span><span class="info-val">${s['Cantidad de refrigerante'] || '0'} Galones</span></div>
                    <div class="info-item"><span class="info-label">Filtro de Aceite</span><span class="info-val">${s['filtro aceite'] || 'N/A'}</span></div>
                    <div class="info-item"><span class="info-label">Filtro de Aire</span><span class="info-val">${s['Filtro de aire'] || 'N/A'}</span></div>
                    <div class="info-item"><span class="info-label">Filtro de Combustible</span><span class="info-val">${s['Filtro de combustible'] || 'N/A'}</span></div>
                </div>
            </div>`;
    }

    resultDiv.innerHTML = `
        <div class="card">
            <div class="header-title" onclick="copiarID('${idMostrar.replace(/'/g, "\\'")}', '${nombreMostrar.replace(/'/g, "\\'")}', this)">
                <h2>${idMostrar} - ${nombreMostrar}</h2>
                <span id="copyLabel" class="copy-tag">TAP PARA COPIAR ID</span>
            </div>
            
            <div class="map-box">
                <iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=${lat},${lon}&t=k&z=18&output=embed"></iframe>
            </div>

            <div class="ops-grid">
                <div class="ops-badge">
                    <span class="ops-badge-label">🌙 Nocturno</span>
                    <span class="ops-badge-val" style="color: ${colorAcceso};">${accesoNocturno.toUpperCase()}</span>
                </div>
                <div class="ops-badge">
                    <span class="ops-badge-label">🔌 Conectar MG</span>
                    <span class="ops-badge-val" style="color: ${colorConectar};">${conectarMg.toUpperCase()}</span>
                </div>
                <div class="ops-badge">
                    <span class="ops-badge-label">🔋 Autonomía</span>
                    <span class="ops-badge-val" style="color: var(--warning);">${autonomiaFormateada}</span>
                </div>
            </div>

            <div class="info-list">
                ${comentarioAcceso ? `
                <div class="info-item" style="border-left: 4px solid var(--warning);">
                    <span class="info-label" style="color: var(--warning);">📝 Comentario de Acceso</span>
                    <span class="info-val" style="font-size: 0.85rem; line-height: 1.3;">${comentarioAcceso}</span>
                </div>` : ''}

                <div class="info-item" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <span class="info-label">NIC / NIS</span>
                        <span class="info-val" style="color:#fbbf24;">${nicNis}</span>
                    </div>
                    <button class="btn-copy-small" onclick="copiarOtrasCeldas('${nicNis}', this)">📋</button>
                </div>
                
                <div class="info-item"><span class="info-label">Distribuidora</span><span class="info-val">${s.Distribuidora || 'N/A'}</span></div>
                
                ${llaveHTML}
                ${maintenanceHTML}

                <div class="info-item"><span class="info-label">Porte</span><span class="info-val">${s.Porte || 'N/A'}</span></div>
                <div class="info-item"><span class="info-label">Altura</span><span class="info-val">${s.Altura || 'N/A'}</span></div>
                <div class="info-item"><span class="info-label">Propietario</span><span class="info-val">${s.Propietario || 'N/A'}</span></div>
                
                <div class="info-item" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <span class="info-label">Nombre para Propietario</span>
                        <span class="info-val">${propNombre}</span>
                    </div>
                    <button class="btn-copy-small" onclick="copiarOtrasCeldas('${propNombre}', this)">📋</button>
                </div>

                <div class="info-item"><span class="info-label">Tipo de Transmisión</span><span class="info-val">${s['Tipo de Transmisión'] || 'N/A'}</span></div>
                <div class="info-item"><span class="info-label">Municipio</span><span class="info-val">${s.Municipio || 'N/A'}</span></div>
                <div class="info-item"><span class="info-label">Dirección Exacta</span><span class="info-val">${s.DIRECCION || s['Dirección'] || 'N/A'}</span></div>
            </div>
            
            <a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" class="btn-gps">🚀 INICIAR GPS</a>
            <a href="${waUrl}" target="_blank" class="btn-wa">📱 COMPARTIR POR WHATSAPP</a>
        </div>
    `;
    setTimeout(() => { resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 150);
}

function toggleMaint() {
    const content = document.getElementById('maint-content');
    const arrow = document.getElementById('maint-arrow');
    const isVisible = window.getComputedStyle(content).display === 'flex';
    content.style.display = isVisible ? 'none' : 'flex';
    arrow.innerText = isVisible ? '▼' : '▲';
    if (navigator.vibrate) navigator.vibrate(15);
}

function copiarID(id, nombre, el) {
    let textoACopiar = "";
    const lbl = document.getElementById('copyLabel');
    const tiene6Digitos = /^[a-zA-Z0-9]{6}$/.test(id);

    if (tiene6Digitos) {
        textoACopiar = `${id} - ${nombre}`;
        lbl.innerText = "¡ID + NOMBRE COPIADOS!";
    } else {
        textoACopiar = nombre;
        lbl.innerText = "⚠️ ID INVÁLIDO: ¡SÓLO NOMBRE COPIADO!";
    }

    navigator.clipboard.writeText(textoACopiar);
    if (navigator.vibrate) navigator.vibrate(20);
    
    lbl.style.color = "var(--success)";
    setTimeout(() => { 
        lbl.innerText = "TAP PARA COPIAR ID"; 
        lbl.style.color = "var(--primary)"; 
    }, 2000);
}

function copiarOtrasCeldas(txt, el) {
    if (!txt || txt === 'N/A') return;
    navigator.clipboard.writeText(txt);
    if (navigator.vibrate) navigator.vibrate(20);
    const original = el.innerText;
    el.innerText = "✅";
    setTimeout(() => { el.innerText = original; }, 1000);
}

function limpiar() { input.value = ''; clearBtn.style.display = 'none'; sugDiv.style.display = 'none'; resultDiv.innerHTML = ''; window.scrollTo({top: 0, behavior: 'smooth'});}
function goHome() { window.scrollTo({top: 0, behavior: 'smooth'}); setTimeout(() => { window.location.href = 'index.html'; }, 200); }
document.addEventListener('click', (e) => { if (!input.contains(e.target)) sugDiv.style.display = 'none'; });
</script>
</body>
</html>
